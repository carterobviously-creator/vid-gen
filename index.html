<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 700px;
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .field {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 120px;
        }
        .field label {
            font-size: 12px;
            color: #555;
            margin-bottom: 4px;
        }
        .field input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        button[type="submit"] {
            padding: 10px;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button[type="submit"]:hover {
            opacity: 0.9;
        }
        .progress-bar {
            width: 100%;
            background: #e0e0e0;
            border-radius: 5px;
            height: 20px;
            margin-bottom: 15px;
        }
        .progress {
            height: 100%;
            background: #76c7c0;
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s;
        }
        .status {
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
            min-height: 18px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .grid img {
            width: 100%;
            border-radius: 5px;
        }
        video {
            width: 100%;
            border-radius: 5px;
            margin-top: 15px;
        }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #2575fc;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }
        .download-link:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 AI Video Generator</h1>
        <form id="promptForm">
            <input type="text" id="prompt" placeholder="Enter your prompt (e.g. a sunset over the ocean)" required>
            <div class="row">
                <div class="field">
                    <label for="numFrames">Frames (3–20)</label>
                    <input type="number" id="numFrames" min="3" max="20" value="10">
                </div>
                <div class="field">
                    <label for="frameDuration">Frame Duration (ms)</label>
                    <input type="number" id="frameDuration" value="1000" min="100" step="100">
                </div>
                <div class="field">
                    <label for="transitionSpeed">Transition Speed (ms)</label>
                    <input type="number" id="transitionSpeed" value="500" min="100" step="100">
                </div>
            </div>
            <button type="submit">Generate Video</button>
        </form>
        <div class="status" id="status"></div>
        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>
        <div class="grid" id="imageGrid"></div>
        <video id="preview" controls style="display: none;"></video>
    </div>

    <script>
        document.getElementById('promptForm').onsubmit = async function(event) {
            event.preventDefault();

            const promptText = document.getElementById('prompt').value;
            const numFrames = +document.getElementById('numFrames').value;
            const frameDuration = +document.getElementById('frameDuration').value;
            const transitionSpeed = +document.getElementById('transitionSpeed').value;

            const imageGrid = document.getElementById('imageGrid');
            const progressBar = document.getElementById('progressBar');
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');

            imageGrid.innerHTML = '';
            progressBar.style.width = '0%';
            preview.style.display = 'none';

            const existingLink = document.querySelector('.download-link');
            if (existingLink) existingLink.remove();

            const loadedImages = [];

            for (let i = 0; i < numFrames; i++) {
                status.textContent = `Generating frame ${i + 1} of ${numFrames}...`;
                const seed = Math.floor(Math.random() * 1000000);
                const encodedPrompt = encodeURIComponent(promptText + ` frame ${i + 1}`);
                const imgURL = `https://image.pollinations.ai/prompt/${encodedPrompt}?seed=${seed}&width=1024&height=576&nologo=true`;

                await new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        loadedImages.push(img);
                        const clone = document.createElement('img');
                        clone.src = img.src;
                        imageGrid.appendChild(clone);
                        progressBar.style.width = `${(loadedImages.length / numFrames) * 100}%`;
                        resolve();
                    };
                    img.onerror = () => {
                        status.textContent = `Frame ${i + 1} failed to load, retrying...`;
                        resolve(); // skip failed frame
                    };
                    img.src = imgURL;
                });
            }

            if (loadedImages.length === 0) {
                status.textContent = 'No frames loaded. Please try again.';
                return;
            }

            status.textContent = `All frames loaded! Composing video...`;
            await createVideo(loadedImages, frameDuration, transitionSpeed);
            status.textContent = 'Done! Your video is ready.';
        };

        async function createVideo(images, frameDuration, transitionSpeed) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 576;
            const ctx = canvas.getContext('2d');

            const stream = canvas.captureStream(30);
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            const chunks = [];

            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) chunks.push(event.data);
            };

            mediaRecorder.start();

            for (let i = 0; i < images.length; i++) {
                ctx.globalAlpha = 1;
                ctx.drawImage(images[i], 0, 0, canvas.width, canvas.height);
                await wait(frameDuration);
                if (i < images.length - 1) {
                    await fadeTransition(ctx, images[i], images[i + 1], transitionSpeed, canvas);
                }
            }

            mediaRecorder.stop();

            await new Promise(resolve => {
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const videoElement = document.getElementById('preview');
                    videoElement.src = url;
                    videoElement.style.display = 'block';

                    const downloadLink = document.createElement('a');
                    downloadLink.href = url;
                    downloadLink.download = 'ai-video.webm';
                    downloadLink.innerText = 'Download Video';
                    downloadLink.className = 'download-link';
                    videoElement.insertAdjacentElement('afterend', downloadLink);
                    resolve();
                };
            });
        }

        function fadeTransition(ctx, imgA, imgB, duration, canvas) {
            return new Promise(resolve => {
                const steps = 30;
                let step = 0;
                const interval = setInterval(() => {
                    const alpha = step / steps;
                    ctx.globalAlpha = 1 - alpha;
                    ctx.drawImage(imgA, 0, 0, canvas.width, canvas.height);
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(imgB, 0, 0, canvas.width, canvas.height);
                    step++;
                    if (step > steps) {
                        clearInterval(interval);
                        ctx.globalAlpha = 1;
                        resolve();
                    }
                }, duration / steps);
            });
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
