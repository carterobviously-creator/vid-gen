<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>AI Video Generator</title>\n    <style>\n        body {\n            background: linear-gradient(to right, #6a11cb, #2575fc);\n            margin: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            font-family: Arial, sans-serif;\n        }\n        .container {\n            background: white;\n            padding: 20px;\n            border-radius: 10px;\n            box-shadow: 0 4px 8px rgba(0,0,0,0.2);\n        }\n        .progress-bar {\n            width: 100%;\n            background: #e0e0e0;\n            border-radius: 5px;\n            height: 20px;\n        }\n        .progress {\n            height: 100%;\n            background: #76c7c0;\n            border-radius: 5px;\n            width: 0%;\n        }\n        .grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));\n            gap: 10px;\n            margin-top: 20px;\n        }\n        img {\n            width: 100%;\n            border-radius: 5px;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>AI Video Generator</h1>\n        <form id="promptForm">\n            <input type="text" id="prompt" placeholder="Enter your prompt" required>\n            <input type="number" id="numFrames" min="3" max="20" value="10">\n            <input type="number" id="frameDuration" value="1000" min="100" step="100">\n            <input type="number" id="transitionSpeed" value="500" min="100" step="100">\n            <button type="submit">Generate</button>\n        </form>\n        <div class="progress-bar">\n            <div class="progress"></div>\n        </div>\n        <div class="grid" id="imageGrid"></div>\n        <video id="preview" controls style="display: none;"></video>\n    </div>\n    <script>\n        document.getElementById('promptForm').onsubmit = async function(event) {\n            event.preventDefault();\n            const prompt = encodeURIComponent(document.getElementById('prompt').value);\n            const numFrames = +document.getElementById('numFrames').value;\n            const frameDuration = +document.getElementById('frameDuration').value;\n            const transitionSpeed = +document.getElementById('transitionSpeed').value;\n            const images = [];\n            document.getElementById('imageGrid').innerHTML = '';\n            const progressBar = document.querySelector('.progress');\n            for (let i = 0; i < numFrames; i++) {\n                const imgURL = `https://image.pollinations.ai/prompt/${prompt}?seed=${Math.random()}`;\n                const img = new Image();\n                img.crossOrigin = 'anonymous';\n                img.src = imgURL;\n                img.onload = () => {\n                    images.push(img);\n                    document.getElementById('imageGrid').appendChild(img);\n                    progressBar.style.width = `${((images.length / numFrames) * 100)}%`;\n                };\n                await new Promise(resolve => setTimeout(resolve, frameDuration));\n            }\n            createVideo(images, frameDuration, transitionSpeed);\n        };\n\n        async function createVideo(images, frameDuration, transitionSpeed) {\n            const canvas = document.createElement('canvas');\n            const ctx = canvas.getContext('2d');\n            canvas.width = 1024;\n            canvas.height = 576;\n            const stream = canvas.captureStream(30);\n            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });\n            let chunks = [];\n            mediaRecorder.ondataavailable = event => chunks.push(event.data);\n            mediaRecorder.start();\n            for (let i = 0; i < images.length; i++) {\n                ctx.drawImage(images[i], 0, 0);\n                await new Promise(resolve => setTimeout(resolve, frameDuration));\n                if (i < images.length - 1) {\n                    await fadeTransition(ctx, images[i], images[i + 1], transitionSpeed);\n                }\n            }\n            mediaRecorder.stop();\n            mediaRecorder.onstop = () => {\n                const blob = new Blob(chunks, { type: 'video/webm' });\n                const url = URL.createObjectURL(blob);\n                const videoElement = document.getElementById('preview');\n                videoElement.src = url;\n                videoElement.style.display = 'block';\n                const downloadLink = document.createElement('a');\n                downloadLink.href = url;\n                downloadLink.download = 'video.webm';\n                downloadLink.innerText = 'Download Video';\n                document.body.appendChild(downloadLink);\n            };\n        }\n\n        function fadeTransition(ctx, imgA, imgB, duration) {\n            return new Promise(resolve => {\n                const steps = 30;\n                let step = 0;\n                const interval = setInterval(() => {\n                    const alpha = step / steps;\n                    ctx.globalAlpha = 1 - alpha;\n                    ctx.drawImage(imgA, 0, 0);\n                    ctx.globalAlpha = alpha;\n                    ctx.drawImage(imgB, 0, 0);\n                    step++;\n                    if (step > steps) {\n                        clearInterval(interval);\n                        resolve();\n                    }\n                }, duration / steps);\n            });\n        }\n    </script>\n</body>\n</html>\n
