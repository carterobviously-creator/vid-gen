<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Video Generator - No Limits, No API Keys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin: 0 5px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        textarea, input[type="number"], input[type="color"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .color-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .inline-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        #slidesList {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 50px;
        }

        .slide-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slide-info {
            flex: 1;
        }

        .slide-text {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .slide-details {
            font-size: 0.85em;
            color: #666;
        }

        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .remove-btn:hover {
            background: #dc2626;
        }

        #videoPreview {
            margin-top: 20px;
            text-align: center;
        }

        video {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .color-group, .inline-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 HTML Video Generator</h1>
        <div class="subtitle">
            <span class="badge">No API Keys</span>
            <span class="badge">No Limits</span>
            <span class="badge">100% Free</span>
        </div>

        <div class="form-group">
            <label>📝 Slide Text</label>
            <textarea id="slideText" placeholder="Enter your text here..."></textarea>
        </div>

        <div class="inline-group">
            <div class="form-group">
                <label>⏱️ Duration (seconds)</label>
                <input type="number" id="duration" value="3" min="0.5" step="0.5">
            </div>
            <div class="form-group">
                <label>📏 Font Size (px)</label>
                <input type="number" id="fontSize" value="48" min="12" max="200">
            </div>
        </div>

        <div class="color-group">
            <div class="form-group">
                <label>🎨 Background Color</label>
                <input type="color" id="bgColor" value="#000000">
            </div>
            <div class="form-group">
                <label>✏️ Text Color</label>
                <input type="color" id="textColor" value="#ffffff">
            </div>
        </div>

        <button onclick="addSlide()">➕ Add Slide</button>

        <div id="slidesList"></div>

        <button class="btn-secondary" onclick="previewSlides()">👁️ Preview Slides</button>
        <button class="btn-success" onclick="generateVideo()">🎥 Generate Video</button>

        <div id="status"></div>
        <div id="videoPreview"></div>
    </div>

    <script>
        let slides = [];

        function addSlide() {
            const text = document.getElementById('slideText').value.trim();
            const duration = parseFloat(document.getElementById('duration').value);
            const bgColor = document.getElementById('bgColor').value;
            const textColor = document.getElementById('textColor').value;
            const fontSize = parseInt(document.getElementById('fontSize').value);

            if (!text) {
                showStatus('Please enter some text!', 'error');
                return;
            }

            const slide = {
                text,
                duration,
                bgColor,
                textColor,
                fontSize
            };

            slides.push(slide);
            updateSlidesList();
            
            // Clear form
            document.getElementById('slideText').value = '';
            showStatus('Slide added successfully!', 'success');
        }

        function updateSlidesList() {
            const list = document.getElementById('slidesList');
            if (slides.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999;">No slides yet. Add your first slide above!</p>'; 
                return;
            }

            list.innerHTML = slides.map((slide, index) => `
                <div class="slide-item">
                    <div class="slide-info">
                        <div class="slide-text">${slide.text.substring(0, 50)}${slide.text.length > 50 ? '...' : ''}</div>
                        <div class="slide-details">
                            Duration: ${slide.duration}s | 
                            Font: ${slide.fontSize}px | 
                            Colors: <span style="color: ${slide.bgColor}">█</span> / <span style="color: ${slide.textColor}">█</span>
                        </div>
                    </div>
                    <button class="remove-btn" onclick="removeSlide(${index})">Remove</button>
                </div>
            `).join('');
        }

        function removeSlide(index) {
            slides.splice(index, 1);
            updateSlidesList();
            showStatus('Slide removed!', 'info');
        }

        function previewSlides() {
            if (slides.length === 0) {
                showStatus('Add some slides first!', 'error');
                return;
            }

            const previewWindow = window.open('', 'Preview', 'width=800,height=600');
            previewWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { margin: 0; padding: 0; overflow: hidden; }
                        .slide {
                            width: 100vw;
                            height: 100vh;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            text-align: center;
                            padding: 40px;
                            white-space: pre-wrap;
                            word-wrap: break-word;
                        }
                    </style>
                </head>
                <body>
                    <div id="slideContainer"></div>
                    <script>
                        const slides = ${JSON.stringify(slides)};
                        let currentSlide = 0;
                        
                        function showSlide() {
                            if (currentSlide >= slides.length) {
                                document.body.innerHTML = '<div class="slide" style="background: #667eea; color: white; font-size: 48px;">Preview Complete!</div>';
                                return;
                            }
                             
                            const slide = slides[currentSlide];
                            document.getElementById('slideContainer').innerHTML = 
                                '<div class="slide" style="background: ' + slide.bgColor + 
                                '; color: ' + slide.textColor + 
                                '; font-size: ' + slide.fontSize + 'px;">' + 
                                slide.text + '</div>';
                             
                            setTimeout(() => {
                                currentSlide++;
                                showSlide();
                            }, slide.duration * 1000);
                        }
                        
                        showSlide();
                    <\/script>
                </body>
                </html>
            `);
        }

        async function generateVideo() {
            if (slides.length === 0) {
                showStatus('Add some slides first!', 'error');
                return;
            }

            showStatus('Generating video... Please wait!', 'info');

            const canvas = document.createElement('canvas');
            canvas.width = 1920;
            canvas.height = 1080;
            const ctx = canvas.getContext('2d');

            const stream = canvas.captureStream(30);
            const mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 5000000
            });

            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const videoPreview = document.getElementById('videoPreview');
                videoPreview.innerHTML = `
                    <video controls autoplay>
                        <source src="${url}" type="video/webm">
                    </video>
                `;
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'video-' + Date.now() + '.webm';
                a.click();
                
                showStatus('Video generated and downloaded successfully!', 'success');
            };

            mediaRecorder.start();

            for (const slide of slides) {
                await renderSlide(ctx, canvas, slide);
            }

            mediaRecorder.stop();
        }

        function renderSlide(ctx, canvas, slide) {
            return new Promise((resolve) => {
                const frameCount = Math.ceil(slide.duration * 30);
                let currentFrame = 0;

                const interval = setInterval(() => {
                    ctx.fillStyle = slide.bgColor;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                     
                    ctx.fillStyle = slide.textColor;
                    ctx.font = `${slide.fontSize}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    const lines = slide.text.split('\n');
                    const lineHeight = slide.fontSize * 1.4;
                    const totalHeight = lines.length * lineHeight;
                    const startY = (canvas.height - totalHeight) / 2 + slide.fontSize / 2;
                    
                    lines.forEach((line, i) => {
                        ctx.fillText(line, canvas.width / 2, startY + i * lineHeight);
                    });

                    currentFrame++;
                    if (currentFrame >= frameCount) {
                        clearInterval(interval);
                        resolve();
                    }
                }, 1000 / 30);
            });
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = message;
            
            setTimeout(() => {
                if (type !== 'info') {
                    status.textContent = '';
                    status.className = 'status';
                }
            }, 3000);
        }

        // Initialize
        updateSlidesList();
    </script>
</body>
</html>
